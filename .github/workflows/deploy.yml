# Builds the Jekyll site with the project's own Gemfile and deploys it to
# GitHub Pages. We use this custom workflow (instead of "Pages: deploy from a
# branch") because the classic github-pages gem only supports a whitelist of
# themes and rejects jekyll-theme-yat.
#
# One-time setup: in the repo, set Settings > Pages > Source = "GitHub Actions".
name: Deploy Jekyll site to GitHub Pages

# Deploy on every push to main; also allow manual runs from the Actions tab.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions required by the deploy-pages action (OIDC token + Pages write).
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deployment at a time.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
