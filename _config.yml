# =============================================================================
#  Jekyll site configuration — MoSAIC-P38
#  NOTE: Restart `jekyll serve` after editing this file; it is not hot-reloaded.
# =============================================================================

title: MoSAIC-P38
description: >-
  MoSAIC-P38 — a computer architecture system from the LBNL
  Computer Architecture Group (AMCR).
theme: jekyll-theme-yat
baseurl: ""   # set to "/repo-name" if hosting under a GitHub Pages project path
url: ""

# Brand palette (reference only — the authoritative copy used for styling lives
# in _sass/custom/_lbnl.scss as CSS variables). Kept here for documentation.
color_palette:
  dark_blue:  "#00313C"
  teal:       "#007681"
  light_gray: "#B1B3B3"
  dark_gray:  "#63666A"

# Pages listed in the top navigation bar, in order. Each entry is a source file
# whose front-matter `title` becomes the menu label. Rendered by the theme's
# views/header.html. (Partner logos live in the footer; see _data/sponsors.yaml.)
header_pages:
  - index.md
  - documentation.md
  - tutorials.md
  - test-cases.md
  - about.md

# Copyright / legal notice rendered in the site footer (see
# _includes/views/footer.html). Markdown is supported.
copyright_notice: |
  P38 heterogeneous multi-tiled system with support for message queues (MoSAIC) Copyright (c) 2024, The Regents of the University of California, through Lawrence Berkeley National Laboratory (subject to receipt of any required approvals from the U.S. Dept. of Energy). All rights reserved.

  If you have questions about your rights to use or distribute this software, please contact Berkeley Lab's Intellectual Property Office at IPO@lbl.gov.

  NOTICE. This Software was developed under funding from the U.S. Department of Energy and the U.S. Government consequently retains certain rights. As such, the U.S. Government has been granted for itself and others acting on its behalf a paid-up, nonexclusive, irrevocable, worldwide license in the Software to reproduce, distribute copies to the public, prepare derivative works, and perform publicly and display publicly, and to permit others to do so.

# yat theme settings
yat:
  date_format: "%b %-d, %Y"

plugins:
  - jekyll-feed       # RSS/Atom feed
  - jekyll-seo-tag    # <meta> SEO tags (consumed by {% seo %} in head.html)
  - jekyll-paginate   # pagination support

# Files kept out of the built _site output.
exclude:
  - AGENTS.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - bxewebsite/   # local-only reference copy of the BXE site; not part of this build
